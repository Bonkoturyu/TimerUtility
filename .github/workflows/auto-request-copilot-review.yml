name: Auto-request Copilot review

# Free private repo では Settings → Copilot → Code review の ruleset が
# enforce されない (Rulesets API が 403) ため、PR open 時に Copilot を
# 自動 reviewer として request する Action で代替する。
#
# 失敗してもユーザは手動で Copilot を reviewer に追加できるため、
# このワークフローのジョブが落ちても続行可能 (`|| true` で吸収)。

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  request:
    # Copilot 自身が PR を開く可能性がある (Coding agent 利用時) ため、
    # その場合は再帰防止で skip。
    if: github.event.pull_request.user.login != 'copilot-pull-request-reviewer[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        # GitHub 公式: `gh pr edit N --add-reviewer @copilot` で Copilot
        # を reviewer 化する公式手段。出典:
        # https://docs.github.com/en/copilot/how-tos/use-copilot-agents/request-a-code-review/use-code-review
        #
        # 検証履歴 (PR #9): REST API `/pulls/N/requested_reviewers` に
        # `{"reviewers": ["Copilot"]}` を投げる方式は 200 で返るが silently
        # 無視され `requested_reviewers` が空のままだったため不可。
        # `copilot-pull-request-reviewer` (bot login) は 422
        # "not a collaborator" エラー。`@copilot` (lowercase + @ prefix)
        # のみ動作した。
        #
        # silent fail 対策 (PR #11 で観測): `gh pr edit ... --add-reviewer @copilot`
        # が exit 0 で完了しても requested_reviewers が空のまま、というケースが
        # ある (secrets.GITHUB_TOKEN の権限不足等が疑い)。`gh api` で実際の
        # requested_reviewers を読み返し、Copilot が含まれていなければ
        # 明示的に exit 1 でジョブを失敗させ CI status バッジで検知できる
        # ようにする。
        run: |
          set -euo pipefail

          if ! gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer @copilot; then
            echo "::error::gh pr edit failed to add Copilot as reviewer."
            echo "Manual recovery: gh pr edit $PR_NUMBER --repo $REPO --add-reviewer @copilot"
            exit 1
          fi

          # API から実際の requested_reviewers を読み返して silent fail を検出。
          # PR #9 検証で response 形式は `{users: [...], teams: [...]}` と確認済
          # (bot reviewer も users 配列に入る)。Copilot のログイン名は環境により
          # `Copilot` / `copilot-pull-request-reviewer` のいずれかになり得るため
          # case-insensitive の `copilot` 部分一致で判定する。
          reviewers_json=$(gh api "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers")
          if echo "$reviewers_json" \
              | jq -e '[.users[]?.login // empty] | map(ascii_downcase) | any(test("copilot"))' \
              > /dev/null; then
            echo "Copilot reviewer successfully requested."
          else
            echo "::error::gh pr edit returned success but Copilot is NOT in requested_reviewers (silent fail)."
            echo "::error::Likely cause: secrets.GITHUB_TOKEN lacks permission to add Copilot as reviewer."
            echo "Current requested_reviewers:"
            echo "$reviewers_json" | jq '{users: [.users[]?.login], teams: [.teams[]?.slug]}'
            echo "Manual recovery: gh pr edit $PR_NUMBER --repo $REPO --add-reviewer @copilot"
            exit 1
          fi
