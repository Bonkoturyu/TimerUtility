name: timer_utility
description: "Stopwatch and timer app for Android 16"
publish_to: 'none'
version: 1.0.0+1
homepage: https://github.com/Bonkoturyu/TimerUtility
repository: https://github.com/Bonkoturyu/TimerUtility
issue_tracker: https://github.com/Bonkoturyu/TimerUtility/issues

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  clock: ^1.1.1
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  flutter_local_notifications: ^19.0.0
  audioplayers: ^6.0.0
  permission_handler: ^12.0.0
  uuid: ^4.0.0
  logger: ^2.0.0
  freezed_annotation: ^2.4.4
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  intl: any  # flutter_localizations と整合する版を Flutter SDK が選ぶ
  shared_preferences: ^2.5.5
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  # Phase D-2: diagnostic ログをアプリ専有ディレクトリに永続化するため、
  # getApplicationSupportDirectory() を解決する。drift 経由で 2.1.5 が既に
  # transitive に入っているのを direct dependency として昇格する。
  path_provider: ^2.1.5
  # Phase D-2 (PR #50 review fix): path.join でプラットフォーム別の
  # path separator を吸収する。flutter_localizations / drift 経由で
  # transitive に入っているので `any` で SDK 整合を取る。
  path: any
  # Phase D-3: diagnostic ログを zip にまとめて OS Share Sheet に渡す。
  # archive は Pure Dart (Native plugin 不要)、share_plus は manifest
  # auto-merge で FileProvider を自動宣言する。
  archive: ^3.6.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  mocktail: ^1.0.0
  fake_async: ^1.3.1
  custom_lint: any
  riverpod_lint: any
  freezed: ^2.5.2

# Ecosystem 互換性のための override
# analyzer_plugin 0.12.0 は analyzer 7.6.0 と非互換でビルドスクリプト
# コンパイルが失敗するため、新しいバージョンを強制指定する。
# 詳細: https://github.com/dart-lang/sdk/issues (analyzer 7 移行関連)
dependency_overrides:
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
